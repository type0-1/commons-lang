# Scheduling settings used for this distribution
# algorithm: lpt
# risk_factor: 1
name: Java CI with Maven
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - name: Build and test
        run: mvn --errors --show-version --batch-mode --no-transfer-progress -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
  test-job-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - &a1
        name: Detect available cores
        id: cores
        run: |-
          TOTAL=$(nproc)
          LOAD=$(awk '{print int($1+0.5)}' /proc/loadavg)
          IDLE=$(( TOTAL - LOAD > 1 ? TOTAL - LOAD : 1 ))
          echo "count=$IDLE" >> $GITHUB_OUTPUT
      - name: Run tests
        run: mvn test -Dtest=org.apache.commons.lang3 -DfailIfNoSpecifiedTests=false
          -Dsurefire.forkCount=${{ steps.cores.outputs.count }}
          -Dsurefire.reuseForks=true
    needs:
      - build
  test-job-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - *a1
      - name: Run tests
        run: mvn test
          -Dtest=org.apache.commons.lang3.concurrent,org.apache.commons.lang3
          -DfailIfNoSpecifiedTests=false -Dsurefire.forkCount=${{
          steps.cores.outputs.count }} -Dsurefire.reuseForks=true
    needs:
      - build
